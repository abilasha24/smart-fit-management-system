<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Workouts | Smart Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f6f7fb; }
    .sidebar { min-height:100vh; background:#111827; color:#fff; }
    .sidebar a{
      color:#c7c7c7; text-decoration:none; display:block;
      padding:12px 18px; border-radius:8px; margin-bottom:6px;
    }
    .sidebar a.active, .sidebar a:hover{ background:#1f2937; color:#fff; }
    .content { padding:30px; }
    .card { border-radius:16px; }
  </style>
</head>

<body>
<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-3 col-lg-2 sidebar p-3">
      <h4 class="fw-bold mb-2">SMART FIT</h4>
      <div class="small text-white-50 mb-4">
        Hi, <span id="navUsername" class="text-white fw-semibold">Member</span>
      </div>

      <a href="dashboard.html">🏠 Dashboard</a>
      <a href="workouts.html">💪 Workouts</a>
      <a href="myworkout.html" class="active">🏋️ My Workouts</a>
      <a href="progress.html">📈 Progress</a>
      <a href="profile.html">👤 Profile</a>
      <a href="subscription.html">💳 Subscription</a>
      <a href="notifications.html">🔔 Notifications</a>
      <a href="feedback.html">📝 Feedback</a>
      
      <a href="../../index.html">🌐 Back to Website</a>
      <a href="../../backend/logout.php" class="text-danger mt-3">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="col-md-9 col-lg-10 content">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h2 class="fw-bold mb-0">🏋️ My Workouts</h2>
          <div class="text-muted">Your workout history</div>
        </div>
        <div id="statusText" class="text-muted"></div>
      </div>

      <div id="msg" class="text-danger mb-3"></div>

      <div class="card shadow-sm">
        <div class="card-body">

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-dark">
                <tr>
                  <th>#</th>
                  <th>Workout</th>
                  <th>Level</th>
                  <th>Duration</th>
                  <th>Calories</th>
                  <th>Status</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr>
                  <td colspan="7" class="text-center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function setStatus(t){ document.getElementById("statusText").textContent = t || ""; }
function showMsg(t){ document.getElementById("msg").textContent = t || ""; }

async function authGuard(){
  try{
    const res = await fetch("../../backend/whoami.php", { credentials:"same-origin" });
    const me = await res.json();
    if(!me.logged_in || (me.role||"").toLowerCase() !== "member"){
      window.location.href = "../../login.html";
      return null;
    }
    document.getElementById("navUsername").textContent = me.username || "Member";
    return me;
  }catch(e){
    window.location.href = "../../login.html";
    return null;
  }
}

async function loadMyWorkouts(){
  showMsg(""); setStatus("Loading...");
  try{
    const res = await fetch("../../backend/get_my_workouts.php", { credentials:"same-origin" });
    const data = await res.json();

    if(!data.ok){
      showMsg(data.message || "Failed to load workouts");
      setStatus("");
      return;
    }

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if(!data.workouts.length){
      tbody.innerHTML = `<tr><td colspan="7" class="text-center">No workouts yet</td></tr>`;
      setStatus("");
      return;
    }

    let i = 1;
    data.workouts.forEach(w=>{
      const badge = (w.status === "completed")
        ? `<span class="badge bg-success">Completed</span>`
        : `<span class="badge bg-warning text-dark">Started</span>`;

      tbody.innerHTML += `
        <tr>
          <td>${i++}</td>
          <td>${w.title}</td>
          <td>${(w.level||"").toUpperCase()}</td>
          <td>${w.duration_min} mins</td>
          <td>${w.calories} cal</td>
          <td>${badge}</td>
          <td>${w.workout_date}</td>
        </tr>
      `;
    });

    setStatus("Ready");
  }catch(e){
    console.error(e);
    showMsg("Network / JSON error. Check backend/get_my_workouts.php");
    setStatus("");
  }
}

(async function(){
  const me = await authGuard();
  if(me) await loadMyWorkouts();
})();
</script>

</body>
</html>
