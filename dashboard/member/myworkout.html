<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>My Workouts - Member</title>

  <link rel="stylesheet" href="../../css/shared.css">
  <link rel="stylesheet" href="../../css/style.css">

  <style>
    /* ===== Layout (SAME AS workouts.html) ===== */
    body{ margin:0; background:#f6f8fb; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; }
    .layout{ display:flex; min-height:100vh; }

    /* Sidebar */
    .sidebar{
      width:260px; background:#0f172a; color:#fff;
      padding:22px 16px; position:sticky; top:0; height:100vh;
      box-shadow:0 10px 20px rgba(0,0,0,.25);
    }
    .brand{ font-weight:800; letter-spacing:.6px; font-size:26px; margin-bottom:10px; }
    .hello{ color:#cbd5e1; font-size:14px; margin:0 0 16px; }
    .nav{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
    .nav a{
      text-decoration:none; color:#e5e7eb;
      padding:12px 12px; border-radius:12px;
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,.03);
    }
    .nav a:hover{ background:rgba(255,255,255,.08); }
    .nav a.active{ background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.10); }
    .nav .spacer{ height:10px; }
    .nav a.logout{ color:#ffb4b4; background:rgba(255,0,0,.06); }
    .nav a.logout:hover{ background:rgba(255,0,0,.10); }

    /* Main */
    .main{ flex:1; padding:24px; }
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:10px;
    }
    .status-top{ font-size:14px; color:#555; display:flex; align-items:center; gap:10px; }
    .pill{
      padding:6px 10px; border-radius:999px; font-size:12px;
      border:1px solid #e5e7eb; background:#fff;
    }

    .alert { background:#fff3cd; border:1px solid #ffeeba; padding:12px 14px; border-radius:10px; color:#856404; }
    .error { background:#ffe5e5; border:1px solid #ffbdbd; color:#7a0f0f; }
    .hint { color:#6b7280; font-size:14px; margin:6px 0 0; }

    /* Table */
    .table-wrap{
      margin-top:16px;
      background:#fff; border-radius:14px;
      box-shadow:0 10px 20px rgba(0,0,0,.06);
      border:1px solid #eee; overflow:hidden;
    }
    table{ width:100%; border-collapse:collapse; }
    thead th{
      background:#1f252b; color:#fff;
      text-align:left; padding:14px 16px; font-weight:800;
    }
    tbody td{
      padding:14px 16px; border-top:1px solid #f0f0f0; color:#222;
    }
    tbody tr:hover{ background:#fafafa; }
    .badge{
      display:inline-block; padding:4px 10px; border-radius:999px;
      font-size:12px; font-weight:800;
    }
    .badge-started{ background:#fff3cd; color:#856404; border:1px solid #ffeeba; }
    .badge-completed{ background:#e9f7ef; color:#1e7e34; border:1px solid #c8ead6; }

    @media (max-width: 900px){
      .sidebar{ position:fixed; left:-9999px; }
      .main{ padding:18px; }
    }
  </style>
</head>

<body>
  <div class="layout">

    <!-- ===== Sidebar (SAME AS workouts.html) ===== -->
    <aside class="sidebar">
      <div class="brand">SMART FIT</div>
      <p class="hello">Hi, <b id="helloName">Member</b></p>

      <nav class="nav">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="workouts.html">💪 Workouts</a>
        <a class="active" href="myworkout.html">🏋️ My Workouts</a>
        <a href="progress.html">📈 Progress</a>
        <a href="profile.html">👤 Profile</a>
        <a href="subscription.html">💳 Subscription</a>
        <a href="notifications.html">🔔 Notifications</a>
        <a href="feedback.html">📝 Feedback</a>
        <a href="bmi.html">📊 BMI</a>


        <div class="spacer"></div>

        <a href="../../index.html">🌐 Back to Website</a>
        <a class="logout" href="#" id="btnLogout">🚪 Logout</a>
      </nav>
    </aside>

    <!-- ===== Main ===== -->
    <main class="main">
      <div class="topbar">
        <div>
          <h1 style="margin:0;">🏋️ My Workouts</h1>
          <p class="hint">Your workout history</p>
        </div>

        <div class="status-top">
          <span class="pill" id="statusTop">Loading...</span>
        </div>
      </div>

      <div id="msg" style="margin:14px 0;"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:60px;">#</th>
              <th>Workout</th>
              <th style="width:140px;">Level</th>
              <th style="width:140px;">Duration</th>
              <th style="width:140px;">Calories</th>
              <th style="width:140px;">Status</th>
              <th style="width:220px;">Date</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="7">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>

  </div>

<script>
  const API_BASE = "../../backend";

  const msgEl = document.getElementById("msg");
  const rowsEl = document.getElementById("rows");
  const statusTop = document.getElementById("statusTop");

  // Sidebar name (same as workouts.html method)
  const savedName = localStorage.getItem("loggedUserName") || "Member";
  document.getElementById("helloName").textContent = savedName;

  function showMsg(html, type="warn"){
    if(!html){ msgEl.innerHTML=""; return; }
    const cls = (type==="error") ? "alert error" : "alert";
    msgEl.innerHTML = `<div class="${cls}">${html}</div>`;
  }

  async function safeJson(res){
    const txt = await res.text();
    try { return JSON.parse(txt); }
    catch(e){
      console.error("JSON parse failed:", txt);
      throw new Error("Invalid JSON");
    }
  }

  function esc(s) {
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function badge(status){
    const s = String(status || "").toLowerCase();
    if (s === "completed") return `<span class="badge badge-completed">completed</span>`;
    return `<span class="badge badge-started">${esc(status || "started")}</span>`;
  }

  async function loadMyWorkouts(){
    try{
      showMsg("");
      statusTop.textContent = "Loading...";

      const res = await fetch(`${API_BASE}/get_my_workouts.php`, {
        method: "GET",
        credentials: "same-origin"
      });

      const data = await safeJson(res);

      if(!data.ok){
        rowsEl.innerHTML = `<tr><td colspan="7">No data</td></tr>`;
        statusTop.textContent = "Error ❌";
        showMsg(data.message || "Failed to load workouts", "error");
        return;
      }

      const items = Array.isArray(data.items) ? data.items : [];
      statusTop.textContent = `Loaded ${items.length} ✅`;

      if(items.length === 0){
        rowsEl.innerHTML = `<tr><td colspan="7">No workouts yet. Go to Workouts page and Start/Complete one.</td></tr>`;
        return;
      }

      rowsEl.innerHTML = items.map((it, idx) => `
        <tr>
          <td>${idx+1}</td>
          <td>${esc(it.title)}</td>
          <td>${esc(it.level || "beginner")}</td>
          <td>${Number(it.duration_min || 0)} mins</td>
          <td>${Number(it.calories || 0)} cal</td>
          <td>${badge(it.status)}</td>
          <td>${esc(it.date || "")}</td>
        </tr>
      `).join("");

    } catch(err){
      console.error(err);
      statusTop.textContent = "Error ❌";
      showMsg(`Network/JSON error. Check ${API_BASE}/get_my_workouts.php`, "error");
      rowsEl.innerHTML = `<tr><td colspan="7">Failed to load</td></tr>`;
    }
  }

  // Logout (same as workouts.html)
  document.getElementById("btnLogout").addEventListener("click", async (e) => {
    e.preventDefault();
    try {
      await fetch(`${API_BASE}/logout.php`, { method:"POST", credentials:"same-origin" });
    } catch {}
    localStorage.removeItem("loggedUserName");
    localStorage.removeItem("loggedUserRole");
    window.location.href = "../../login.html";
  });

  loadMyWorkouts();
</script>
</body>
</html>
