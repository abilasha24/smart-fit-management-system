<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile | Smart Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f6f7fb; }
    .sidebar { min-height:100vh; background:#111827; color:#fff; }
    .sidebar a{
      color:#c7c7c7; text-decoration:none; display:block;
      padding:12px 18px; border-radius:8px; margin-bottom:6px;
    }
    .sidebar a.active, .sidebar a:hover{ background:#1f2937; color:#fff; }
    .content { padding:30px; }
    .card { border-radius:16px; }
  </style>
</head>

<body>
<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-3 col-lg-2 sidebar p-3">
      <h4 class="fw-bold mb-2">SMART FIT</h4>
      <div class="small text-white-50 mb-4">
        Hi, <span id="navUsername" class="text-white fw-semibold">Member</span>
      </div>

      <a href="dashboard.html">🏠 Dashboard</a>
      <a href="workouts.html">💪 Workouts</a>
      <a href="myworkout.html">🏋️ My Workouts</a>
      <a href="progress.html">📈 Progress</a>
      <a href="meal_plans.html">
  <span>🥗</span> Meal Plans
</a>
      <a href="profile.html" class="active">👤 Profile</a>
      <a href="subscription.html">💳 Subscription</a>
      <a href="notifications.html">🔔 Notifications</a>
      <a href="feedback.html">📝 Feedback</a>
      <a href="bmi.html">📊 BMI</a>


      <a href="../../index.html">🌐 Back to Website</a>
      <a href="#" id="btnLogout" class="text-danger mt-3 d-block">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="col-md-9 col-lg-10 content">

      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h2 class="fw-bold mb-0">👤 Profile</h2>
          <div class="text-muted">View and update your details</div>
        </div>
        <div id="statusText" class="text-muted"></div>
      </div>

      <div id="msg" class="mb-3"></div>

      <div class="card shadow-sm">
        <div class="card-body">
          <form onsubmit="return false;">
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input id="username" class="form-control" minlength="3">
              <div class="form-text">This is your login username (not the greeting name)</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Email (read-only)</label>
              <input id="email" class="form-control" disabled>
            </div>

            <button id="saveBtn" type="button" class="btn btn-success">
              Save Changes
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API = {
  whoami: "../../backend/whoami.php",
  getProfile: "../../backend/get_profile.php",
  updateProfile: "../../backend/update_profile.php",
  logout: "../../backend/logout.php"
};

function setStatus(t){ document.getElementById("statusText").textContent = t || ""; }

function showMsg(t, ok=false){
  const el = document.getElementById("msg");
  el.className = ok ? "text-success" : "text-danger";
  el.textContent = t || "";
}

async function fetchJSON(url, opts={}){
  const res = await fetch(url, { credentials:"same-origin", ...opts });
  return await res.json();
}

/* ✅ FAST UI: show saved name instantly */
(function(){
  const saved = localStorage.getItem("loggedUserName");
  if(saved){
    const nav = document.getElementById("navUsername");
    if(nav) nav.textContent = saved;
  }
})();

async function authGuard(){
  try{
    const me = await fetchJSON(API.whoami);

    if(!me.logged_in){
      window.location.href = "../../login.html";
      return null;
    }

    if(((me.role||"member").toLowerCase()) !== "member"){
      window.location.href = "../../login.html";
      return null;
    }

    // ✅ use name for greeting
    const displayName = (me.name || me.username || "Member").trim();
    const nav = document.getElementById("navUsername");
    if(nav) nav.textContent = displayName;

    localStorage.setItem("loggedUserName", displayName);
    localStorage.setItem("loggedUserRole", (me.role || "member").toLowerCase());

    return me;
  }catch(e){
    window.location.href = "../../login.html";
    return null;
  }
}

async function loadProfile(){
  setStatus("Loading...");
  const data = await fetchJSON(API.getProfile);

  if(data.ok){
    username.value = data.user.username || "";
    email.value = data.user.email || "";
    setStatus("Ready ✅");
  }else{
    showMsg(data.message || "Failed to load profile");
    setStatus("");
  }
}

async function saveProfile(){
  const usernameVal = username.value.trim();
  if(usernameVal.length < 3){
    showMsg("Username must be at least 3 characters");
    return;
  }

  setStatus("Saving...");
  showMsg("");

  const res = await fetch(API.updateProfile, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    credentials:"same-origin",
    body: JSON.stringify({ username: usernameVal })
  });

  const data = await res.json();

  if(data.ok){
    showMsg("Profile updated successfully ✅", true);
    setStatus("Saved ✅");
    // NOTE: Greeting name is full name (me.name), not username.
    // If you want greeting to change too, update first_name/last_name in DB.
  }else{
    showMsg(data.message || "Update failed");
    setStatus("");
  }
}

document.getElementById("saveBtn").onclick = saveProfile;

/* ✅ Logout */
document.getElementById("btnLogout").addEventListener("click", async (e) => {
  e.preventDefault();
  try{
    await fetch(API.logout, { method:"POST", credentials:"same-origin" });
  }catch{}
  localStorage.removeItem("loggedUserName");
  localStorage.removeItem("loggedUserRole");
  window.location.href = "../../login.html";
});

/* ✅ init */
(async ()=>{
  const me = await authGuard();
  if(me) loadProfile();
})();
</script>

</body>
</html>
