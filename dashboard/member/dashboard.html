<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Dashboard - Smart Fit</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f6f7fb; }
    .topbar { background:#1f2328; color:#fff; padding: 14px 0; }
    .brand { font-weight:700; letter-spacing:1px; }
    .dashboard-wrap { padding: 28px 0; }
    .welcome-card { background:#fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); padding: 26px; }
    .mini-card { background:#fff; border-radius: 10px; border: 1px solid #e9ecef; padding: 18px; height: 100%; }
    .muted { color:#6c757d; }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="brand fs-5">SMART FIT</div>

      <div class="d-flex align-items-center gap-3">
        <small class="text-white-50" id="roleText"></small>
        <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>

  <div class="container dashboard-wrap">
    <div class="welcome-card">
      <h3 class="mb-1">
        Welcome, <span id="memberName" class="text-success">Member</span> 👋
      </h3>
      <p class="muted mb-4">This is your Member Dashboard.</p>

      <div class="row g-3">
        <div class="col-md-4">
          <div class="mini-card">
            <h6 class="fw-bold mb-1">Your Plan</h6>
            <div class="muted" id="planText">Loading...</div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="mini-card">
            <h6 class="fw-bold mb-1">Next Workout</h6>
            <div class="muted" id="workoutText">Not set</div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="mini-card">
            <h6 class="fw-bold mb-1">Progress</h6>
            <div class="muted" id="progressText">0%</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const name = localStorage.getItem("loggedUserName") || "Member";
    const role = localStorage.getItem("loggedUserRole") || "member";

    document.getElementById("memberName").textContent = name;
    document.getElementById("roleText").textContent = role.toUpperCase();

    const plan = localStorage.getItem("loggedUserPlan") || "Basic";
    document.getElementById("planText").textContent = plan;

    document.getElementById("logoutBtn").addEventListener("click", function () {
      localStorage.removeItem("loggedUserName");
      localStorage.removeItem("loggedUserRole");
      localStorage.removeItem("loggedUserPlan");
      window.location.href = "/smart_fit/login.html";
    });
  </script>
</body>
</html>
