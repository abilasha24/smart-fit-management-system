<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback | Smart Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f6f7fb; }
    .sidebar { min-height:100vh; background:#111827; color:#fff; }
    .sidebar a{
      color:#c7c7c7; text-decoration:none; display:block;
      padding:12px 18px; border-radius:8px; margin-bottom:6px;
    }
    .sidebar a.active, .sidebar a:hover{ background:#1f2937; color:#fff; }
    .content { padding:30px; }
    .card { border-radius:16px; }
  </style>
</head>

<body>
<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-3 col-lg-2 sidebar p-3">
      <h4 class="fw-bold mb-2">SMART FIT</h4>
      <div class="small text-white-50 mb-4">
        Hi, <span id="navUsername" class="text-white fw-semibold">Member</span>
      </div>

      <a href="dashboard.html">🏠 Dashboard</a>
      <a href="workouts.html">💪 Workouts</a>
      <a href="myworkout.html">🏋️ My Workouts</a>
      <a href="progress.html">📈 Progress</a>
      <a href="profile.html">👤 Profile</a>
      <a href="subscription.html">💳 Subscription</a>
      <a href="notifications.html">🔔 Notifications</a>
      <a href="feedback.html" class="active">📝 Feedback</a>

      <a href="../../index.html">🌐 Back to Website</a>
      <a href="../../backend/logout.php" class="text-danger mt-3">🚪 Logout</a>
    </div>

    <!-- MAIN -->
   <div class="col-md-9 col-lg-10 content">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h2 class="fw-bold mb-0">📝 Feedback</h2>
      <div class="text-muted">Send your feedback to improve Smart Fit</div>
    </div>

    <div class="d-flex gap-2 align-items-center">
      <a href="dashboard.html" class="btn btn-outline-dark btn-sm">⬅ Dashboard</a>
      <a href="../../index.html" class="btn btn-dark btn-sm">🏠 Home</a>
      <div id="statusText" class="text-muted"></div>
    </div>
  </div>

  <div id="msg" class="mb-3"></div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form id="feedbackForm" onsubmit="return false;">
        <div class="mb-3">
          <label class="form-label fw-semibold">Subject</label>
          <input class="form-control" id="subject" placeholder="Eg: Workout suggestion" required minlength="3">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Message</label>
          <textarea class="form-control" id="message" rows="5" placeholder="Write your feedback..." required minlength="5"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Rating (optional)</label>
          <select class="form-select" id="rating">
            <option value="">Select rating</option>
            <option value="5">⭐⭐⭐⭐⭐ (5)</option>
            <option value="4">⭐⭐⭐⭐ (4)</option>
            <option value="3">⭐⭐⭐ (3)</option>
            <option value="2">⭐⭐ (2)</option>
            <option value="1">⭐ (1)</option>
          </select>
        </div>

        <button class="btn btn-success" id="sendBtn">Submit Feedback</button>
      </form>
    </div>
  </div>

    </div><!-- /content -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function setStatus(t){ document.getElementById("statusText").textContent = t || ""; }
function showMsg(t, ok=false){
  const el = document.getElementById("msg");
  el.className = ok ? "text-success mb-3" : "text-danger mb-3";
  el.textContent = t || "";
}

async function authGuard(){
  try{
    const res = await fetch("../../backend/whoami.php", { credentials:"same-origin" });
    const me = await res.json();
    if(!me.logged_in || (me.role||"").toLowerCase() !== "member"){
      window.location.href = "../../login.html";
      return null;
    }
    document.getElementById("navUsername").textContent = me.username || "Member";
    return me;
  }catch(e){
    window.location.href = "../../login.html";
    return null;
  }
}

async function submitFeedback(){
  showMsg(""); setStatus("Submitting...");
  const subject = document.getElementById("subject").value.trim();
  const message = document.getElementById("message").value.trim();
  const ratingStr = document.getElementById("rating").value;
  const rating = ratingStr ? parseInt(ratingStr, 10) : null;

  try{
    const res = await fetch("../../backend/submit_feedback.php",{
      method:"POST",
      credentials:"same-origin",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ subject, message, rating })
    });

    const data = await res.json();
    if(!data.ok){
      showMsg(data.message || "Failed to submit");
      setStatus("");
      return;
    }

    showMsg("Feedback submitted ✅ Thank you!", true);
    document.getElementById("feedbackForm").reset();
    setStatus("Done");
  }catch(e){
    console.error(e);
    showMsg("Network error while submitting feedback");
    setStatus("");
  }
}

document.getElementById("sendBtn").addEventListener("click", submitFeedback);

(async function(){
  const me = await authGuard();
  if(me) setStatus("Ready ✅");
})();
</script>

</body>
</html>
