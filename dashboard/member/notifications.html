<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notifications | Smart Fit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f6f7fb; }
    .sidebar { min-height:100vh; background:#111827; color:#fff; }
    .sidebar a{
      color:#c7c7c7; text-decoration:none; display:block;
      padding:12px 18px; border-radius:8px; margin-bottom:6px;
    }
    .sidebar a.active, .sidebar a:hover{ background:#1f2937; color:#fff; }
    .content { padding:30px; }
    .card { border-radius:16px; }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:8px; }
  </style>
</head>

<body>
<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-3 col-lg-2 sidebar p-3">
      <h4 class="fw-bold mb-2">SMART FIT</h4>
      <div class="small text-white-50 mb-4">
        Hi, <span id="navUsername" class="text-white fw-semibold">Member</span>
      </div>

      <a href="dashboard.html">🏠 Dashboard</a>
      <a href="workouts.html">💪 Workouts</a>
      <a href="myworkout.html">🏋️ My Workouts</a>
      <a href="progress.html">📈 Progress</a>
      <a href="meal_plans.html">
  <span>🥗</span> Meal Plans
</a>
      <a href="profile.html">👤 Profile</a>
      <a href="subscription.html">💳 Subscription</a>
      <a href="notifications.html" class="active">🔔 Notifications</a>
      <a href="feedback.html">📝 Feedback</a>
      <a href="bmi.html">📊 BMI</a>


      <a href="../../index.html">🌐 Back to Website</a>
      <a href="#" id="btnLogout" class="text-danger mt-3 d-block">🚪 Logout</a>
    </div>

    <!-- MAIN -->
    <div class="col-md-9 col-lg-10 content">

      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h2 class="fw-bold mb-0">🔔 Notifications</h2>
          <div class="text-muted">Updates and messages for you</div>
        </div>

        <div class="d-flex align-items-center gap-2">
          <a href="dashboard.html" class="btn btn-outline-dark btn-sm">⬅ Back to Dashboard</a>
          <span class="text-muted">Unread: <span id="unreadCount">0</span></span>
          <button class="btn btn-sm btn-dark" id="markAllBtn">Mark All Read</button>
        </div>
      </div>

      <div id="msg" class="mb-3 text-danger"></div>

      <div id="list" class="row g-3">
        <div class="col-12 text-center text-muted">Loading...</div>
      </div>

    </div><!-- /content -->
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = {
  whoami: "../../backend/whoami.php",
  getNotifications: "../../backend/get_notifications.php",
  markRead: "../../backend/mark_notification_read.php",
  logout: "../../backend/logout.php"
};

function showMsg(t, ok=false){
  const el = document.getElementById("msg");
  el.className = ok ? "text-success mb-3" : "text-danger mb-3";
  el.textContent = t || "";
}

/* ✅ FAST UI: show saved name instantly */
(function(){
  const saved = localStorage.getItem("loggedUserName");
  if(saved){
    const nav = document.getElementById("navUsername");
    if(nav) nav.textContent = saved;
  }
})();

async function authGuard(){
  try{
    const res = await fetch(API.whoami, { credentials:"same-origin" });
    const me = await res.json();

    if(!me.logged_in || (me.role||"").toLowerCase() !== "member"){
      window.location.href = "../../login.html";
      return null;
    }

    const displayName = (me.name || me.username || "Member").trim();

    const nav = document.getElementById("navUsername");
    if(nav) nav.textContent = displayName;

    localStorage.setItem("loggedUserName", displayName);
    localStorage.setItem("loggedUserRole", (me.role || "member").toLowerCase());

    return me;
  }catch(e){
    window.location.href = "../../login.html";
    return null;
  }
}

async function loadNotifications(){
  showMsg("");

  const res = await fetch(API.getNotifications, { credentials:"same-origin" });
  const data = await res.json();

  if(!data.ok){
    showMsg(data.message || "Failed to load notifications");
    return;
  }

  document.getElementById("unreadCount").textContent = data.unread ?? 0;

  const list = document.getElementById("list");
  list.innerHTML = "";

  if(!data.notifications || data.notifications.length === 0){
    list.innerHTML = `<div class="col-12"><div class="alert alert-info">No notifications</div></div>`;
    return;
  }

  data.notifications.forEach(n=>{
    const isRead = (n.is_read === 1);
    const dotColor = isRead ? "#9ca3af" : "#ef4444";
    const badge = isRead
      ? `<span class="badge bg-secondary">Read</span>`
      : `<span class="badge bg-danger">Unread</span>`;

    const btn = isRead
      ? `<button class="btn btn-sm btn-outline-secondary" disabled>Marked</button>`
      : `<button class="btn btn-sm btn-dark" data-id="${n.id}">Mark Read</button>`;

    list.innerHTML += `
      <div class="col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <span class="dot" style="background:${dotColor}"></span>
                <span class="fw-bold">${escapeHtml(n.title)}</span>
              </div>
              ${badge}
            </div>
            <div class="text-muted mt-2" style="white-space:pre-line">${escapeHtml(n.message)}</div>
            <div class="d-flex justify-content-between align-items-center mt-3">
              <div class="small text-muted">${n.created_at}</div>
              ${btn}
            </div>
          </div>
        </div>
      </div>
    `;
  });

  list.querySelectorAll("button[data-id]").forEach(b=>{
    b.addEventListener("click", async ()=>{
      const id = parseInt(b.dataset.id, 10);
      await markRead(id);
    });
  });
}

async function markRead(id){
  showMsg("");
  const res = await fetch(API.markRead,{
    method:"POST",
    credentials:"same-origin",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ id })
  });
  const data = await res.json();

  if(!data.ok){
    showMsg(data.message || "Failed");
    return;
  }
  showMsg("Marked as read ✅", true);
  await loadNotifications();
}

async function markAllRead(){
  showMsg("");
  const res = await fetch(API.markRead,{
    method:"POST",
    credentials:"same-origin",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ mark_all: 1 })
  });
  const data = await res.json();

  if(!data.ok){
    showMsg(data.message || "Failed");
    return;
  }
  showMsg("All marked as read ✅", true);
  await loadNotifications();
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

document.getElementById("markAllBtn").addEventListener("click", markAllRead);

/* ✅ Logout */
document.getElementById("btnLogout").addEventListener("click", async (e) => {
  e.preventDefault();
  try{
    await fetch(API.logout, { method:"POST", credentials:"same-origin" });
  }catch{}
  localStorage.removeItem("loggedUserName");
  localStorage.removeItem("loggedUserRole");
  window.location.href = "../../login.html";
});

/* ✅ init */
(async function(){
  const me = await authGuard();
  if(me) await loadNotifications();
})();
</script>

</body>
</html>
