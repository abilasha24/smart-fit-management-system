<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Workouts | Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f6f7fb; }
    .sidebar { width: 260px; min-height: 100vh; background:#111827; color:#fff; }
    .sidebar a { color:#cbd5e1; text-decoration:none; display:block; padding:10px 14px; border-radius:10px; }
    .sidebar a:hover, .sidebar a.active { background:#1f2937; color:#fff; }
    .card-soft { border:0; border-radius:16px; box-shadow:0 6px 18px rgba(17,24,39,.08); }
    .muted { color:#6b7280; }
  </style>
</head>
<body>

<div class="d-flex">
  <!-- Sidebar -->
  <aside class="sidebar p-3">
    <div class="fs-5 fw-bold mb-3">SMART FIT • Admin</div>
    <div class="small text-white-50 mb-3">Control Center</div>

    <a href="dashboard.html">Dashboard</a>
    <a class="active" href="workouts.html">Manage Workouts</a>
    <a href="users.html">Manage Users</a>
    <a href="plans.html">Plans & Payments</a>
    <a href="feedback.html">Feedback</a>
    <a href="../../index.html">← Back to Home</a>

    <hr class="border-secondary my-3"/>
    <button id="btnLogout" class="btn btn-outline-light w-100">Logout</button>
  </aside>

  <!-- Main -->
  <main class="flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h3 class="mb-0">Manage Workouts</h3>
        <div class="muted">Add / Edit / Delete workouts</div>
      </div>
      <button class="btn btn-dark" id="btnAdd">+ Add Workout</button>
    </div>

    <div class="card card-soft p-3">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Level</th>
              <th>Duration</th>
              <th>Calories</th>
              <th style="width:160px;">Actions</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="text-center muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal fade" id="workoutModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Workout</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="wId" value="">

        <label class="form-label">Title</label>
        <input class="form-control mb-2" id="wTitle" placeholder="e.g., Cardio Burn">

        <label class="form-label">Level</label>
        <select class="form-select mb-2" id="wLevel">
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>

        <label class="form-label">Duration (minutes)</label>
        <input type="number" class="form-control mb-2" id="wDuration" min="1" placeholder="e.g., 30">

        <label class="form-label">Calories</label>
        <input type="number" class="form-control" id="wCalories" min="0" placeholder="e.g., 250">
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-dark" id="btnSave">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const BASE = "../../";
  const modal = new bootstrap.Modal(document.getElementById("workoutModal"));

  async function guardAdmin(){
    const r = await fetch(BASE + "backend/check_auth.php", {credentials:"include"});
    if (r.status === 401) return location.href = BASE + "login.html";
    const data = await r.json();
    if ((data.role||"") !== "admin") {
      if (data.role === "trainer") location.href = BASE + "dashboard/trainer/dashboard.html";
      else location.href = BASE + "dashboard/member/dashboard.html";
    }
  }

  async function loadWorkouts(){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = `<tr><td colspan="6" class="text-center muted">Loading...</td></tr>`;
    const r = await fetch(BASE + "backend/admin_workouts_list.php", {credentials:"include"});
    const data = await r.json();
    if (!data.ok) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Failed to load</td></tr>`;
      return;
    }

    if (!data.workouts.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center muted">No workouts yet</td></tr>`;
      return;
    }

    tbody.innerHTML = data.workouts.map(w => `
      <tr>
        <td>${w.id}</td>
        <td>${escapeHtml(w.title)}</td>
        <td><span class="badge text-bg-secondary">${escapeHtml(w.level)}</span></td>
        <td>${w.duration_min} min</td>
        <td>${w.calories}</td>
        <td>
          <button class="btn btn-sm btn-outline-dark me-1" onclick='editWorkout(${JSON.stringify(w)})'>Edit</button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteWorkout(${w.id})">Delete</button>
        </td>
      </tr>
    `).join("");
  }

  function openAdd(){
    document.getElementById("modalTitle").textContent = "Add Workout";
    document.getElementById("wId").value = "";
    document.getElementById("wTitle").value = "";
    document.getElementById("wLevel").value = "beginner";
    document.getElementById("wDuration").value = "";
    document.getElementById("wCalories").value = "";
    modal.show();
  }

  window.editWorkout = function(w){
    document.getElementById("modalTitle").textContent = "Edit Workout";
    document.getElementById("wId").value = w.id;
    document.getElementById("wTitle").value = w.title;
    document.getElementById("wLevel").value = w.level;
    document.getElementById("wDuration").value = w.duration_min;
    document.getElementById("wCalories").value = w.calories;
    modal.show();
  }

  async function saveWorkout(){
    const payload = {
      id: document.getElementById("wId").value,
      title: document.getElementById("wTitle").value.trim(),
      level: document.getElementById("wLevel").value,
      duration_min: document.getElementById("wDuration").value,
      calories: document.getElementById("wCalories").value
    };

    const r = await fetch(BASE + "backend/admin_workout_save.php", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      credentials:"include",
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if (!data.ok) return alert(data.message || "Save failed");

    modal.hide();
    await loadWorkouts();
  }

  window.deleteWorkout = async function(id){
    if (!confirm("Delete this workout?")) return;
    const r = await fetch(BASE + "backend/admin_workout_delete.php?id=" + encodeURIComponent(id), {credentials:"include"});
    const data = await r.json();
    if (!data.ok) return alert("Delete failed");
    await loadWorkouts();
  }

  async function logout(){
    await fetch(BASE + "backend/logout.php", {credentials:"include"}).catch(()=>{});
    location.href = BASE + "login.html";
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
  }

  document.getElementById("btnAdd").addEventListener("click", openAdd);
  document.getElementById("btnSave").addEventListener("click", saveWorkout);
  document.getElementById("btnLogout").addEventListener("click", logout);

  (async ()=>{
    await guardAdmin();
    await loadWorkouts();
  })();
</script>
</body>
</html>
