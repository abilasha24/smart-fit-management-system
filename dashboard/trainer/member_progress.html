<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Member Progress | Trainer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root{
      --bg:#f6f7fb;
      --sidebar:#0b1220; --sidebar2:#0f172a;
      --text:#0f172a; --muted:#6b7280;
      --card:#ffffff; --line:#e5e7eb;
    }
    body{ background:var(--bg); color:var(--text); }
    .app{ min-height:100vh; }

    /* Sidebar */
    .sidebar{
      width:270px; min-height:100vh; position:sticky; top:0;
      background:linear-gradient(180deg,var(--sidebar),var(--sidebar2));
      color:#fff; padding:18px 16px;
      box-shadow:10px 0 30px rgba(0,0,0,.08);
      display:flex; flex-direction:column;
    }
    .brand{ font-weight:800; font-size:26px; margin-bottom:8px; letter-spacing:.5px; }
    .hello{ color:#cbd5e1; font-size:14px; margin-bottom:16px; }

    .nav-item{
      display:flex; align-items:center; gap:12px;
      padding:12px 14px; border-radius:14px;
      color:#e5e7eb; text-decoration:none;
      margin-bottom:10px; transition:.15s ease;
      position:relative;
    }
    .nav-item:hover{ background:rgba(255,255,255,.06); color:#fff; }
    .nav-item.active{
      background:rgba(255,255,255,.10);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
      color:#fff;
    }
    .nav-item.active::before{
      content:"";
      position:absolute;
      left:-6px; top:10px;
      width:4px; height:calc(100% - 20px);
      border-radius:99px;
      background:rgba(59,130,246,.95);
      box-shadow:0 0 18px rgba(59,130,246,.55);
    }

    .nav-ico{
      width:40px;height:40px;border-radius:14px;
      display:grid;place-items:center;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      flex:0 0 40px;
    }
    .nav-ico i{ font-size:18px; line-height:1; }

    .ico-sky    { background:#e0f2fe; border-color:#7dd3fc; color:#0284c7; }
    .ico-indigo { background:#e0e7ff; border-color:#a5b4fc; color:#4338ca; }
    .ico-amber  { background:#fef3c7; border-color:#fcd34d; color:#d97706; }
    .ico-cyan   { background:#cffafe; border-color:#67e8f9; color:#0891b2; }
    .ico-green  { background:#dcfce7; border-color:#86efac; color:#16a34a; }
    .ico-rose   { background:#ffe4e6; border-color:#fda4af; color:#e11d48; }
    .ico-slate  { background:#e2e8f0; border-color:#cbd5e1; color:#334155; }

    .nav-item.active .nav-ico{ box-shadow:0 0 0 2px rgba(255,255,255,.12); }

    .nav-sep{ border-color:rgba(255,255,255,.12)!important; margin:14px 0; }
    .logout{ color:#fca5a5; }
    .logout:hover{ background:rgba(239,68,68,.12); color:#fecaca; }

    .sidebar-footer{ margin-top:auto; padding:12px 10px 6px; color:rgba(226,232,240,.75); font-size:12px; }
    .sidebar-footer .mini{ opacity:.8; font-size:11px; }

    /* Main */
    .main{ padding:26px 28px; }
    .subtitle{ color:var(--muted); }
    .card-soft{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 10px 22px rgba(15,23,42,.06);
    }
    .badge-pill{ border-radius:999px; padding:.35rem .6rem; }
    .btn-pill{ border-radius:999px; }
    .table td{ vertical-align:middle; }
    .table thead th{ color:var(--muted); font-weight:700; font-size:13px; }

    .chip{
      width:40px;height:40px;border-radius:14px;display:grid;place-items:center;
      border:1px solid var(--line); background:#f8fafc; color:#111827; font-size:18px;
    }
    .chip-cyan{ background:#ecfeff; border-color:#a5f3fc; color:#0891b2; }
  </style>
</head>

<body>
<div class="app d-flex">
  <aside class="sidebar">
    <div class="brand">SMART FIT</div>
    <div class="hello">Hi, <span id="trainerName">trainer</span></div>

    <a class="nav-item" href="dashboard.html"><span class="nav-ico ico-sky"><i class="bi bi-speedometer2"></i></span><span>Dashboard</span></a>
    <a class="nav-item" href="members.html"><span class="nav-ico ico-indigo"><i class="bi bi-people"></i></span><span>Members & Assign</span></a>
    <a class="nav-item" href="manage_workouts.html"><span class="nav-ico ico-amber"><i class="bi bi-activity"></i></span><span>Workouts</span></a>
    <a class="nav-item active" href="member_progress.html"><span class="nav-ico ico-cyan"><i class="bi bi-graph-up-arrow"></i></span><span>Progress</span></a>
    <a class="nav-item" href="meal_plans.html"><span class="nav-ico ico-green"><i class="bi bi-egg-fried"></i></span><span>Meal Plans</span></a>
    <a class="nav-item" href="profile.html"><span class="nav-ico ico-slate"><i class="bi bi-person"></i></span><span>Profile</span></a>
    <a class="nav-item" href="nutrition.html"><span class="nav-ico ico-rose"><i class="bi bi-apple"></i></span><span>Nutrition</span></a>
    <a class="nav-item" href="schedule.html"><span class="nav-ico ico-sky"><i class="bi bi-calendar2-week"></i></span><span>Schedule</span></a>
    <a class="nav-item" href="../../index.html"><span class="nav-ico ico-slate"><i class="bi bi-globe"></i></span><span>Back to Website</span></a>

    <hr class="nav-sep">
    <a class="nav-item logout" href="#" id="btnLogout"><span class="nav-ico ico-rose"><i class="bi bi-box-arrow-right"></i></span><span>Logout</span></a>

    <div class="sidebar-footer">
      <div class="fw-bold">Trainer Panel</div>
      <div class="mini">Smart Fit • v1.0</div>
    </div>
  </aside>

  <main class="main flex-grow-1">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
      <div>
        <h3 class="mb-1 d-flex align-items-center gap-2">
          <span class="chip chip-cyan"><i class="bi bi-graph-up-arrow"></i></span>
          Member Progress
        </h3>
        <div class="subtitle">Search members and view workout completion counts</div>
      </div>
      <span class="badge text-bg-dark badge-pill">Ready <i class="bi bi-check2 ms-1"></i></span>
    </div>

    <div class="card-soft p-3 mt-3">
      <div class="row g-2 align-items-center">
        <div class="col-md-6">
          <label class="form-label subtitle mb-1">Search</label>
          <input id="q" class="form-control" placeholder="Search name/email..." />
        </div>
        <div class="col-md-3 d-grid">
          <button class="btn btn-outline-dark btn-pill mt-md-4" id="btnSearch">
            <i class="bi bi-search me-2"></i>Search
          </button>
        </div>
        <div class="col-md-3 d-grid">
          <button class="btn btn-dark btn-pill mt-md-4" id="btnReload">
            <i class="bi bi-arrow-clockwise me-2"></i>Reload
          </button>
        </div>
      </div>

      <div class="table-responsive mt-3">
        <table class="table table-sm mb-0">
          <thead>
            <tr>
              <th>Member</th>
              <th>Email</th>
              <th>Started</th>
              <th>Completed</th>
              <th style="width:170px;">Action</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="5" class="subtitle">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
  const BASE = "../../";
  const API  = BASE + "backend/";

  const q = document.getElementById("q");
  const rows = document.getElementById("rows");
  const btnSearch = document.getElementById("btnSearch");
  const btnReload = document.getElementById("btnReload");

  async function guardTrainer(){
    const r = await fetch(API+"check_auth.php",{credentials:"include"});
    if(r.status===401) return location.href=BASE+"login.html";
    const data = await r.json();

    if((data.role||"")!=="trainer"){
      if(data.role==="admin") location.href=BASE+"dashboard/admin/dashboard.html";
      else location.href=BASE+"dashboard/member/dashboard.html";
      return;
    }
    if(data.username) document.getElementById("trainerName").textContent = data.username;
  }

  async function logout(){
    await fetch(API+"logout.php",{method:"POST",credentials:"include"}).catch(()=>{});
    location.href=BASE+"login.html";
  }

  document.getElementById("btnLogout").addEventListener("click",(e)=>{
    e.preventDefault();
    logout();
  });

  function esc(s){
    return String(s??"")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function pill(n, type){
    const cls = type==="ok" ? "text-bg-success" : type==="warn" ? "text-bg-warning" : "text-bg-secondary";
    return `<span class="badge ${cls} badge-pill">${Number(n||0)}</span>`;
  }

  async function load(){
    const params = new URLSearchParams();
    if(q.value.trim()) params.set("q", q.value.trim());

    // ✅ Correct endpoint (your backend file):
    const r = await fetch(API+"trainer_member_progress_list.php?"+params.toString(), { credentials:"include" }).catch(()=>null);
    if(!r){
      rows.innerHTML = `<tr><td colspan="5" class="text-danger">API not reachable</td></tr>`;
      return;
    }

    const d = await r.json().catch(()=>({ok:false}));
    if(!d.ok){
      rows.innerHTML = `<tr><td colspan="5" class="text-danger">Failed to load (check API: trainer_member_progress_list.php)</td></tr>`;
      return;
    }

    const items = d.items || [];
    if(!items.length){
      rows.innerHTML = `<tr><td colspan="5" class="subtitle">No members</td></tr>`;
      return;
    }

    rows.innerHTML = items.map(it=>`
      <tr>
        <td class="fw-bold">${esc(it.name || it.member_name || it.username || "Member")}</td>
        <td class="subtitle">${esc(it.email||"")}</td>
        <td>${pill(it.started||0,"warn")}</td>
        <td>${pill(it.completed||0,"ok")}</td>
        <td>
          <a class="btn btn-sm btn-outline-dark btn-pill"
             href="member_progress_detail.html?user_id=${encodeURIComponent(it.user_id||it.id||"")}">
            <i class="bi bi-eye me-1"></i>Details
          </a>
        </td>
      </tr>
    `).join("");
  }

  btnSearch.addEventListener("click", load);
  btnReload.addEventListener("click", ()=>{ q.value=""; load(); });

  // Enter press = search
  q.addEventListener("keydown", (e)=>{ if(e.key==="Enter") load(); });

  (async()=>{
    await guardTrainer();
    load();
  })();
</script>
</body>
</html>
