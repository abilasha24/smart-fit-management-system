<!-- ✅ keep only one include -->
<script src="trainer_layout.js"></script>

<script>
  // ✅ Always use CAPITAL base
  const API_BASE = (window.API && typeof window.API === "string" && window.API.trim() !== "")
    ? window.API
    : "/SMART_FIT/backend/";

  // Elements
  const q = document.getElementById("q");
  const btnSearch = document.getElementById("btnSearch");
  const btnReload = document.getElementById("btnReload");
  const rows = document.getElementById("rows");

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  async function safeJson(res){
    const txt = await res.text();
    try { return JSON.parse(txt); }
    catch {
      console.error("Invalid JSON:", txt);
      return { ok:false, message:"Invalid JSON from server" };
    }
  }

  async function load(){
    try{
      rows.innerHTML = `<tr><td colspan="4" class="subtitle">Loading...</td></tr>`;

      const params = new URLSearchParams();
      if (q.value.trim()) params.set("q", q.value.trim());

      const url = API_BASE + "trainer_members_list.php" + (params.toString() ? ("?" + params.toString()) : "");
      console.log("Calling:", url);

      const r = await fetch(url, { credentials:"include" });
      const d = await safeJson(r);
      console.log("Response:", d);

      if(!d.ok){
        rows.innerHTML = `<tr><td colspan="4" class="text-danger">${esc(d.message || "Failed")}</td></tr>`;
        return;
      }

      const items = Array.isArray(d.members) ? d.members : [];
      if(!items.length){
        rows.innerHTML = `<tr><td colspan="4" class="subtitle">No members</td></tr>`;
        return;
      }

      rows.innerHTML = items.map((it,i)=>`
        <tr>
          <td>${i+1}</td>
          <td class="fw-bold">${esc(it.name || ((it.first_name||"") + " " + (it.last_name||"")).trim())}</td>
          <td class="subtitle">${esc(it.email||"")}</td>
          <td>
            <a class="btn btn-sm btn-outline-dark btn-pill"
               href="members.html?select=${encodeURIComponent(it.id)}">
              Assign
            </a>
          </td>
        </tr>
      `).join("");

    } catch (err){
      console.error(err);
      rows.innerHTML = `<tr><td colspan="4" class="text-danger">Network/JS error (see Console)</td></tr>`;
    }
  }

  btnSearch.addEventListener("click", load);
  btnReload.addEventListener("click", ()=>{ q.value=""; load(); });

  // Enter key search
  q.addEventListener("keydown", (e)=>{ if(e.key==="Enter") load(); });

  load();
</script>
