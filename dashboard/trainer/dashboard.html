<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trainer Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h3>Welcome, <span id="username" class="text-success">Trainer</span> 👋</h3>
    <a class="btn btn-danger btn-sm mt-3" href="../../backend/logout.php">Logout</a>
  </div>

  <script>
    (async () => {
      const res = await fetch('../../backend/get_profile.php');
      const data = await res.json();
      if (!data.ok || data.role !== 'trainer') { window.location.href='../../login.html'; return; }
      document.getElementById('username').textContent = data.username;
    })();
  </script>
</body>
</html>
